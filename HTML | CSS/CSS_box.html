<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        p.none {
            border-style: none;
        }
        p.hidden {
            border-style: hidden;
        }
        p.solid {
            border-style: solid;
        }
        p.double {
            border-style: double;
        }
        p.dotted {
            border-style: dotted;
        }
        p.dashed {
            border-style: dashed;
        }
        p.groove {
            border-style: groove;
        }
        p.ridge {
            border-style: ridge;
        }
        p.inset {
            border-style: inset;
        }
        p.outset {
            border-style: outset;
        }
        /* 통합 작성 */
        p.solid {
            border: 3px solid orange;
        }
    </style>
</head>
<body>
    <h1>border-style 속성 값</h1>
    <p class="none">none</p>
    <p class="hidden">hidden</p>
    <p class="solid">solid</p>
    <p class="double">double</p>
    <p class="dotted">dotted</p>
    <p class="dashed">dashed</p>
    <p class="groove">groove</p>
    <p class="ridge">ridge</p>
    <p class="inset">inset</p>
    <p class="outset">outset</p>
</body>
</html>
